name: Frappe Tests with Code Coverage
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: postgres:13.3
        ports:
          - 3306:3306
        env:
          POSTGRES_PASSWORD: travis
      redis:
        image: redis:latest
        ports:
          - 6379:6379
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10
      # Step 3: Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      # Step 4: Prepare Frappe Test Environment
      - name: Prepare Frappe Test Environment
        run: |
          bench init --skip-assets frappe-bench
          cd frappe-bench
          bench get-app frappe .
          bench new-site test_site --mariadb-root-password=root --admin-password=admin --install-app frappe
      # Step 5: Run tests with detailed coverage
      - name: Run Tests
        run: |
          cd frappe-bench/apps/frappe
          pytest --cov=frappe --cov-report=term-missing --cov-report=xml --cov-fail-under=100
      # Step 6: Upload code coverage report
      - name: Upload Coverage Report
        uses: matthewcroughan/code-coverage-report-action@v2
        with:
          coverage_file: frappe-bench/apps/frappe/coverage.xml
          minimum_coverage: 75
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}